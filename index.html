<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-header">
        <h1><span class="w-hos">HOS</span><span class="w-pital">PITAL</span></h1>
        <h2>Patient Registry</h2>
    </div>

    <div class="card">

        <section class="panel panel-form">

            <span class="eyebrow">Front Desk · New Entry</span>
            <h3 class="registry-title">Hospital Patient Registry</h3>
            <p class="registry-lede">Add a new patient in a few seconds.</p>

            <form autocomplete="off" action="/register" method="POST">
                <div class="field field-pill">
                    <label for="studentName">Patient Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">👤</span>
                        <input type="text" id="studentName" name="studentName" placeholder="Enter full name" maxlength="60" required>
                    </div>
                </div>

                <div class="field field-pill">
                    <label for="dateOfAdmission">Date of Admission</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">📅</span>
                        <input type="date" id="dateOfAdmission" name="dateOfAdmission" required>
                    </div>
                </div>

                <div class="field field-pill">
                    <label for="rollno">Illness / Diagnosis</label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">🩺</span>
                        <input type="text" id="rollno" name="rollno" placeholder="e.g. Chronic Fever, Dengue" maxlength="100" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    Register Patient
                    <span class="btn-arrow">→</span>
                </button>
            </form>

            <a href="/students" class="create-account">View Patients Directory <span>→</span></a>

            <div class="footer-credit">
                Developed by: <strong>Ayush Kardam</strong>
            </div>
        </section>

        <section class="panel panel-graphic">
            <div class="orbit">
                <div class="orbit-ring"></div>
                <div class="center-badge">
                    <h4>HOSPITAL</h4>
                    <p>Management Service</p>
                </div>
                <span class="orbit-icon i1" title="Consultation">🩺</span>
                <span class="orbit-icon i2" title="IV Drip">💉</span>
                <span class="orbit-icon i3" title="Vitals">❤️</span>
                <span class="orbit-icon i5" title="Wheelchair">♿</span>
                <span class="orbit-icon i6" title="Medicine">💊</span>
                <span class="orbit-icon i7" title="Lab">🧪</span>
                <span class="orbit-icon i8" title="Ambulance">🚑</span>
                <span class="orbit-icon i9" title="Bed">🛏</span>
            </div>
        </section>

    </div>

</body>
</html>
